<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetCare | Bem-vindo ao seu portal pet</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <main class="tela-entrada">
        <section class="painel-destaque">
            <h1 class="texto-boas-vindas">Bem-Vindo</h1>
            <div class="container-foto">
                <img src="./img/juan-definitive-edition-v0-ucv34e0c4q061.webp" alt="" class="imagem-pet">
            </div>
        </section>

        <section class="painel-interativo">
            <div class="conteudo-central">
                <h2 class="chamada-principal">Encontre tudo o que você precisa para seu animal de estimação</h2>

                <div class="opcoes-autenticacao">
                    <button class="btn-metodo-login">
                        <img src="./img/GOOGLE LOGO.png" alt="" aria-hidden="true">
                        <span>Entrar com Google</span>
                    </button>
                    
                    <button class="btn-metodo-login">
                        <img src="./img/LOGO APPLE.png" alt="" aria-hidden="true" class="icone-apple">
                        <span>Entrar com Apple</span>
                    </button>

                    <button class="btn-metodo-login">
                        <img src="./img/GMAIL LOGO.png" alt="" aria-hidden="true">
                        <span>Entrar com E-mail</span>
                    </button>
                </div>

                <div class="rodape-login">
                    <p>Você quer tentar de outra maneira? <a href="#" class="link-ajuda">Saber mais</a></p>
                    <button class="btn-acao-principal">Vamos lá</button>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
